<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Cálculo mental | números cada 5 seg</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, 'Segoe UI', monospace;
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            background: #1e293b;
            border-radius: 40px;
            padding: 30px 25px;
            max-width: 550px;
            width: 100%;
            border: 1px solid #334155;
            text-align: center;
        }

        h1 {
            color: #facc15;
            font-size: 1.8rem;
            margin-bottom: 8px;
        }

        .rango-badge {
            color: #94a3b8;
            background: #0f172a;
            display: inline-block;
            width: 100%;
            padding: 8px;
            border-radius: 60px;
            margin-bottom: 30px;
        }

        .numero-actual {
            background: #020617;
            border-radius: 48px;
            padding: 45px 10px;
            margin: 20px 0;
            border: 2px solid #facc15;
        }

        .numero-actual span {
            font-size: 5.5rem;
            font-weight: 800;
            font-family: monospace;
            color: #facc15;
        }

        .botones {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 25px 0;
            flex-wrap: wrap;
        }

        button {
            background: #facc15;
            border: none;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 12px 24px;
            border-radius: 60px;
            color: #0f172a;
            cursor: pointer;
            transition: 0.2s;
            min-width: 120px;
        }

        button:active {
            transform: scale(0.97);
        }

        .btn-resultado {
            background: #10b981;
            color: white;
        }

        .btn-restart {
            background: #ef4444;
            color: white;
        }

        .resultado-final {
            font-size: 1.6rem;
            font-weight: bold;
            background: #020617;
            padding: 20px;
            border-radius: 40px;
            margin-top: 20px;
            color: #facc15;
            border: 1px solid #facc15;
        }

        .timer-text {
            color: #94a3b8;
            font-size: 0.8rem;
            margin-top: 20px;
        }

        .info-numeros {
            color: #475569;
            font-size: 0.75rem;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="game-container">
    <h1>🧠 CÁLCULO MENTAL</h1>
    <div class="rango-badge">🎲 Números entre -50 y +50 | cada 5 segundos</div>

    <div class="numero-actual">
        <span id="numeroEnPantalla">0</span>
    </div>

    <div class="botones">
        <button id="startBtn">▶ START</button>
        <button id="resultadoBtn" class="btn-resultado" style="display: none;">🧮 RESULTADO</button>
        <button id="restartBtn" class="btn-restart" style="display: none;">🔄 RESTART</button>
    </div>

    <div id="resultadoFinalDiv" class="resultado-final" style="display: none;"></div>
    
    <div class="timer-text" id="timerMsg"></div>
    <div class="info-numeros" id="contadorInfo"></div>
</div>

<script>
    // ---------- CONFIGURACIÓN ----------
    const MIN = -50;
    const MAX = 50;
    const CANTIDAD_NUMEROS = 5;      // cuántos números saldrán
    const INTERVALO_MS = 5000;        // 5 segundos

    // ---------- ESTADO ----------
    let numerosGenerados = [];         // guarda los números internamente (pero NO se muestran)
    let intervaloActivo = null;
    let juegoEnCurso = false;
    let contadorGenerados = 0;

    // ---------- ELEMENTOS DOM ----------
    const numeroPantallaSpan = document.getElementById('numeroEnPantalla');
    const startBtn = document.getElementById('startBtn');
    const resultadoBtn = document.getElementById('resultadoBtn');
    const restartBtn = document.getElementById('restartBtn');
    const resultadoFinalDiv = document.getElementById('resultadoFinalDiv');
    const timerMsg = document.getElementById('timerMsg');
    const contadorInfo = document.getElementById('contadorInfo');

    // ---------- FUNCIONES ----------
    function generarAleatorio() {
        return Math.floor(Math.random() * (MAX - MIN + 1)) + MIN;
    }

    function actualizarPantallaConNumero(num) {
        numeroPantallaSpan.textContent = num;
    }

    function mostrarContador() {
        if (juegoEnCurso && contadorGenerados < CANTIDAD_NUMEROS) {
            contadorInfo.textContent = `📊 Número ${contadorGenerados} de ${CANTIDAD_NUMEROS}`;
        } else if (!juegoEnCurso && numerosGenerados.length === 0) {
            contadorInfo.textContent = `🔘 Presiona START para comenzar (${CANTIDAD_NUMEROS} números)`;
        } else if (numerosGenerados.length === CANTIDAD_NUMEROS) {
            contadorInfo.textContent = `✅ Secuencia completa. Presiona RESULTADO.`;
        }
    }

    function agregarNumeroInterno(num) {
        numerosGenerados.push(num);
        contadorGenerados = numerosGenerados.length;
        actualizarPantallaConNumero(num);
        mostrarContador();
    }

    function detenerIntervalo() {
        if (intervaloActivo) {
            clearInterval(intervaloActivo);
            intervaloActivo = null;
        }
        juegoEnCurso = false;
    }

    function finalizarGeneracion() {
        detenerIntervalo();
        juegoEnCurso = false;
        
        startBtn.style.display = 'none';
        resultadoBtn.style.display = 'inline-block';
        restartBtn.style.display = 'inline-block';
        
        timerMsg.textContent = '🎯 Secuencia terminada. Presiona RESULTADO para sumar.';
        mostrarContador();
    }

    function generarSiguiente() {
        if (!juegoEnCurso) return;
        
        if (numerosGenerados.length >= CANTIDAD_NUMEROS) {
            finalizarGeneracion();
            return;
        }

        const nuevoNum = generarAleatorio();
        agregarNumeroInterno(nuevoNum);
        
        const restantes = CANTIDAD_NUMEROS - numerosGenerados.length;
        if (restantes > 0) {
            timerMsg.textContent = `⏳ Próximo número en 5 segundos... (faltan ${restantes})`;
        }
        
        if (numerosGenerados.length >= CANTIDAD_NUMEROS) {
            finalizarGeneracion();
        }
    }

    function iniciarJuego() {
        // Limpiar todo
        detenerIntervalo();
        numerosGenerados = [];
        contadorGenerados = 0;
        juegoEnCurso = true;
        
        // Ocultar botones hasta que termine
        startBtn.style.display = 'none';
        resultadoBtn.style.display = 'none';
        restartBtn.style.display = 'none';
        
        // Limpiar resultado anterior
        resultadoFinalDiv.style.display = 'none';
        resultadoFinalDiv.innerHTML = '';
        timerMsg.textContent = '🎲 Generando primer número...';
        
        // Primer número inmediato
        const primerNumero = generarAleatorio();
        agregarNumeroInterno(primerNumero);
        
        // Si la cantidad es 1, termina
        if (CANTIDAD_NUMEROS === 1) {
            finalizarGeneracion();
            return;
        }
        
        // Intervalo para los siguientes
        intervaloActivo = setInterval(() => {
            generarSiguiente();
        }, INTERVALO_MS);
    }

    function mostrarResultado() {
        if (numerosGenerados.length === 0) return;
        
        const sumaTotal = numerosGenerados.reduce((acc, val) => acc + val, 0);
        resultadoFinalDiv.style.display = 'block';
        resultadoFinalDiv.innerHTML = `🔢 RESULTADO: ${sumaTotal}`;
        timerMsg.textContent = '✅ Juego terminado. Presiona RESTART para volver a jugar.';
    }

    function restartCompleto() {
        detenerIntervalo();
        numerosGenerados = [];
        contadorGenerados = 0;
        juegoEnCurso = false;
        
        // Resetear botones
        startBtn.style.display = 'inline-block';
        resultadoBtn.style.display = 'none';
        restartBtn.style.display = 'none';
        
        // Limpiar pantalla
        actualizarPantallaConNumero(0);
        resultadoFinalDiv.style.display = 'none';
        resultadoFinalDiv.innerHTML = '';
        timerMsg.textContent = '';
        contadorInfo.textContent = `🔘 Presiona START para comenzar (${CANTIDAD_NUMEROS} números)`;
    }

    // ---------- EVENTOS ----------
    startBtn.addEventListener('click', iniciarJuego);
    resultadoBtn.addEventListener('click', mostrarResultado);
    restartBtn.addEventListener('click', restartCompleto);
    
    // Inicializar mensaje
    contadorInfo.textContent = `🔘 Presiona START para comenzar (${CANTIDAD_NUMEROS} números)`;
</script>
</body>
</html>
